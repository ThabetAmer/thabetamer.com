<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Workflow/automation pattern -->
  <g opacity="0.7">
    <!-- Flow boxes -->
    <rect x="100" y="180" width="100" height="60" rx="8" stroke="url(#grad6)" stroke-width="2" fill="none"/>
    <rect x="280" y="120" width="100" height="60" rx="8" stroke="url(#grad6)" stroke-width="2" fill="none"/>
    <rect x="280" y="240" width="100" height="60" rx="8" stroke="url(#grad6)" stroke-width="2" fill="none"/>
    <rect x="460" y="180" width="100" height="60" rx="8" stroke="url(#grad6)" stroke-width="2" fill="none"/>
    <rect x="640" y="180" width="100" height="60" rx="8" stroke="url(#grad6)" stroke-width="2" fill="none"/>
    <!-- AI brain in center -->
    <circle cx="400" cy="210" r="35" fill="url(#grad6)" opacity="0.3"/>
    <circle cx="400" cy="210" r="25" stroke="#ec4899" stroke-width="2" fill="none"/>
    <!-- Flow arrows -->
    <path d="M200 210 L270 150" stroke="#ec4899" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
    <path d="M200 210 L270 270" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
    <path d="M380 150 L365 195" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
    <path d="M380 270 L365 225" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
    <path d="M435 210 L460 210" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
    <path d="M560 210 L640 210" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Spark effects -->
  <circle cx="400" cy="210" r="4" fill="#fce7f3"/>
  <circle cx="690" cy="210" r="4" fill="#fce7f3"/>
</svg>
