<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Cloud/infrastructure pattern -->
  <g opacity="0.7">
    <!-- Cloud shape -->
    <path d="M250 280 Q200 280 200 230 Q200 180 260 180 Q280 140 340 150 Q400 130 440 170 Q500 160 520 200 Q580 200 580 250 Q580 280 540 280 Z"
          stroke="url(#grad5)" stroke-width="2" fill="none"/>
    <!-- Server racks -->
    <rect x="280" y="300" width="60" height="80" rx="4" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.6"/>
    <rect x="360" y="300" width="60" height="80" rx="4" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.6"/>
    <rect x="440" y="300" width="60" height="80" rx="4" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Server indicators -->
    <circle cx="295" cy="320" r="4" fill="#06b6d4"/>
    <circle cx="295" cy="340" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="295" cy="360" r="4" fill="#06b6d4" opacity="0.3"/>
    <circle cx="375" cy="320" r="4" fill="#06b6d4"/>
    <circle cx="375" cy="340" r="4" fill="#06b6d4"/>
    <circle cx="375" cy="360" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="455" cy="320" r="4" fill="#06b6d4"/>
    <circle cx="455" cy="340" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="455" cy="360" r="4" fill="#06b6d4"/>
  </g>
  <!-- Connection lines to cloud -->
  <line x1="310" y1="300" x2="310" y2="280" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="390" y1="300" x2="390" y2="280" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="470" y1="300" x2="470" y2="280" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
</svg>
