<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad-aba" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Legal Tech Pattern - Scales of Justice + Tech -->
  <g opacity="0.7">
    <!-- Central pillar -->
    <rect x="390" y="160" width="20" height="180" fill="url(#grad-aba)"/>
    <!-- Balance beam -->
    <rect x="250" y="150" width="300" height="8" rx="4" fill="url(#grad-aba)"/>
    <!-- Left scale -->
    <path d="M280 158 L280 220 L230 260 L330 260 L280 220" stroke="#ef4444" stroke-width="2" fill="none"/>
    <ellipse cx="280" cy="265" rx="50" ry="15" fill="url(#grad-aba)" opacity="0.5"/>
    <!-- Right scale -->
    <path d="M520 158 L520 220 L470 260 L570 260 L520 220" stroke="#ef4444" stroke-width="2" fill="none"/>
    <ellipse cx="520" cy="265" rx="50" ry="15" fill="url(#grad-aba)" opacity="0.5"/>
    <!-- Base -->
    <rect x="350" y="340" width="100" height="15" rx="4" fill="url(#grad-aba)"/>
    <path d="M370 340 L400 300 L430 340" fill="url(#grad-aba)"/>
    <!-- Tech elements - code/digital lines -->
    <rect x="255" y="230" width="50" height="4" fill="#fecaca" opacity="0.6"/>
    <rect x="260" y="238" width="40" height="4" fill="#fecaca" opacity="0.4"/>
    <rect x="495" y="230" width="50" height="4" fill="#fecaca" opacity="0.6"/>
    <rect x="500" y="238" width="40" height="4" fill="#fecaca" opacity="0.4"/>
    <!-- Digital connection dots -->
    <circle cx="200" cy="200" r="6" fill="#fecaca"/>
    <circle cx="600" cy="200" r="6" fill="#fecaca"/>
    <path d="M206 200 L250 180" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
    <path d="M594 200 L550 180" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="400" y="400" text-anchor="middle" fill="#ef4444" font-family="Arial" font-size="24" font-weight="bold" opacity="0.8">LEGALTECH</text>
</svg>
