<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad-cnfa" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Agricultural Pattern -->
  <g opacity="0.7">
    <!-- Plant stem -->
    <path d="M400 380 L400 180" stroke="#22c55e" stroke-width="4"/>
    <!-- Leaves -->
    <ellipse cx="360" cy="280" rx="40" ry="20" fill="url(#grad-cnfa)" transform="rotate(-30 360 280)"/>
    <ellipse cx="440" cy="250" rx="45" ry="22" fill="url(#grad-cnfa)" transform="rotate(30 440 250)"/>
    <ellipse cx="350" cy="210" rx="35" ry="18" fill="url(#grad-cnfa)" transform="rotate(-40 350 210)"/>
    <ellipse cx="450" cy="180" rx="40" ry="20" fill="url(#grad-cnfa)" transform="rotate(35 450 180)"/>
    <!-- Tech elements - data points -->
    <circle cx="280" cy="320" r="8" stroke="#22c55e" stroke-width="2" fill="none"/>
    <circle cx="520" cy="300" r="8" stroke="#22c55e" stroke-width="2" fill="none"/>
    <circle cx="300" cy="200" r="6" stroke="#22c55e" stroke-width="2" fill="none"/>
    <circle cx="500" cy="150" r="6" stroke="#22c55e" stroke-width="2" fill="none"/>
    <!-- Connection lines -->
    <path d="M288 320 L350 280" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
    <path d="M512 300 L450 260" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="400" y="100" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="28" font-weight="bold" opacity="0.8">AGRETECH</text>
</svg>
