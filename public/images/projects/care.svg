<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Globe/world pattern representing international humanitarian work -->
  <circle cx="400" cy="225" r="150" stroke="url(#grad2)" stroke-width="2" fill="none"/>
  <ellipse cx="400" cy="225" rx="150" ry="60" stroke="url(#grad2)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <ellipse cx="400" cy="225" rx="60" ry="150" stroke="url(#grad2)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <line x1="250" y1="225" x2="550" y2="225" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="75" x2="400" y2="375" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <!-- Connection dots representing beneficiaries -->
  <circle cx="320" cy="180" r="6" fill="#10b981" opacity="0.8"/>
  <circle cx="480" cy="270" r="6" fill="#10b981" opacity="0.8"/>
  <circle cx="360" cy="300" r="6" fill="#10b981" opacity="0.6"/>
  <circle cx="450" cy="160" r="6" fill="#10b981" opacity="0.6"/>
  <circle cx="280" cy="240" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="520" cy="200" r="4" fill="#10b981" opacity="0.5"/>
</svg>
