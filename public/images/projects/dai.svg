<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad-dai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Women Empowerment Pattern -->
  <g opacity="0.7">
    <!-- Central figure -->
    <circle cx="400" cy="160" r="35" fill="url(#grad-dai)"/>
    <path d="M400 195 L400 300 M350 240 L400 220 L450 240" stroke="#a855f7" stroke-width="4" fill="none"/>
    <!-- Supporting figures left -->
    <circle cx="280" cy="180" r="25" stroke="#a855f7" stroke-width="2" fill="none"/>
    <path d="M280 205 L280 280" stroke="#a855f7" stroke-width="2"/>
    <!-- Supporting figures right -->
    <circle cx="520" cy="180" r="25" stroke="#a855f7" stroke-width="2" fill="none"/>
    <path d="M520 205 L520 280" stroke="#a855f7" stroke-width="2"/>
    <!-- Connection arcs -->
    <path d="M305 180 L375 160" stroke="#c4b5fd" stroke-width="2" opacity="0.5"/>
    <path d="M495 180 L425 160" stroke="#c4b5fd" stroke-width="2" opacity="0.5"/>
    <!-- Rising arrows -->
    <path d="M340 350 L340 320 L330 330 M340 320 L350 330" stroke="#a855f7" stroke-width="2" fill="none"/>
    <path d="M400 350 L400 310 L390 320 M400 310 L410 320" stroke="#a855f7" stroke-width="2" fill="none"/>
    <path d="M460 350 L460 320 L450 330 M460 320 L470 330" stroke="#a855f7" stroke-width="2" fill="none"/>
  </g>
  <!-- Label -->
  <text x="400" y="400" text-anchor="middle" fill="#a855f7" font-family="Arial" font-size="24" font-weight="bold" opacity="0.8">EMPOWERMENT</text>
</svg>
