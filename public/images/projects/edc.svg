<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="grad-edc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Job Matching Network Pattern -->
  <g opacity="0.7">
    <!-- Person node left -->
    <circle cx="200" cy="225" r="40" fill="url(#grad-edc)"/>
    <circle cx="200" cy="205" r="15" fill="#fef3c7"/>
    <!-- Person node right -->
    <circle cx="600" cy="225" r="40" fill="url(#grad-edc)"/>
    <rect x="570" y="200" width="60" height="40" rx="4" fill="#fef3c7"/>
    <!-- Central matching hub -->
    <circle cx="400" cy="225" r="50" stroke="#f59e0b" stroke-width="3" fill="none"/>
    <circle cx="400" cy="225" r="30" fill="url(#grad-edc)" opacity="0.5"/>
    <!-- Connection lines with animation suggestion -->
    <path d="M240 225 L350 225" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 4"/>
    <path d="M450 225 L560 225" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 4"/>
    <!-- Match indicators -->
    <circle cx="400" cy="225" r="10" fill="#fef3c7"/>
    <!-- Supporting nodes -->
    <circle cx="300" cy="140" r="20" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <circle cx="500" cy="140" r="20" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <circle cx="300" cy="310" r="20" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <circle cx="500" cy="310" r="20" stroke="#f59e0b" stroke-width="2" fill="none"/>
    <!-- Connecting to hub -->
    <path d="M315 155 L375 200" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <path d="M485 155 L425 200" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <path d="M315 295 L375 250" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <path d="M485 295 L425 250" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="400" y="390" text-anchor="middle" fill="#f59e0b" font-family="Arial" font-size="24" font-weight="bold" opacity="0.8">JOB MATCHING</text>
</svg>
